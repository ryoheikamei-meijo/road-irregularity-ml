data:
  raw_dir: data/raw
  processed_dir: data/processed
  features_dir: data/features

window:
  window_seconds: 2.0
  stride_seconds: 1.0
  sampling_interval_seconds: 0.25

label:
  mode: binary  # binary or multiclass

model:
  name: svm
  kernel: rbf
  C: 1.0
  gamma: scale
  class_weight: balanced

evaluation:
  test_size: 0.2
  random_state: 42
