data:
  raw_dir: data/raw
  processed_dir: data/processed
  features_dir: data/features

mock_data:
  output_root_dir: data/raw
  output_filename: mock_acc_only.csv
  sampling_interval_seconds: 0.25
  total_duration_seconds: 240.0
  include_gyro: false
  random_state: 42
  noise_std: 0.03
  label_weights:
    "0": 0.55
    "1": 0.15
    "2": 0.30
  label_duration_seconds:
    "0":
      min: 5.0
      max: 20.0
    "1":
      min: 0.25
      max: 1.0
    "2":
      min: 3.0
      max: 10.0

window:
  window_seconds: 2.0
  stride_seconds: 1.0
  sampling_interval_seconds: 0.25

label:
  mode: multiclass

evaluation:
  test_size: 0.2
  random_state: 42
