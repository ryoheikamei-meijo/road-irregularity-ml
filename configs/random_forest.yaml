data:
  raw_dir: data/raw
  processed_dir: data/processed
  features_dir: data/features

window:
  window_seconds: 2.0
  stride_seconds: 1.0
  sampling_interval_seconds: 0.25

label:
  mode: binary  # binary or multiclass

model:
  name: random_forest
  n_estimators: 200
  max_depth: null
  class_weight: balanced
  random_state: 42

evaluation:
  test_size: 0.2
  random_state: 42
